<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alfie Ben Levey</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>A</text></svg>">

<style>

body {
    margin: 0;
    height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    background:
        radial-gradient(circle at center,
        #202020 0%,
        #151515 35%,
        #0b0b0b 75%,
        #050505 100%);

    color: #f5f5f5;
    font-family: Arial, Helvetica, sans-serif;
}


.card {

    text-align: center;

    padding: 90px 130px;

    background: rgba(255,255,255,0.045);

    border: 1px solid rgba(255,255,255,0.12);

    border-radius: 35px;

    backdrop-filter: blur(20px);

    box-shadow:
        0 30px 100px rgba(0,0,0,0.7);

}


h1 {

    margin: 0;

    font-size: 4rem;

    letter-spacing: 4px;

    font-weight: 600;

    text-shadow:
        0 0 25px rgba(255,255,255,0.1);

}


.line {

    width: 120px;

    height: 2px;

    background: #555;

    margin: 35px auto;

}


p {

    margin: 0;

    color: #888;

    font-size: 1.15rem;

}

</style>

</head>


<body>


<div class="card">

<h1>Alfie Ben Levey</h1>

<div class="line"></div>

<p>I'm better than you and you know it</p>

</div>


</body>
</html>
